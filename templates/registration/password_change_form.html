<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改密码</title>
    <!-- 复用之前的样式，稍微简化 -->
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f5f5f5; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
        }
        .card { 
            background: white; 
            padding: 40px; border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
        }
        input { 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #2c3e50; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
        }
        ul { 
            color: #e74c3c; 
            font-size: 0.8em; 
            padding-left: 20px;
        }
        .helptext { 
            font-size: 0.8em; 
            color: black; 
            display: block; 
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align: center;">修改密码</h2>
        <form method="post">
            {% csrf_token %}
            <!-- 手动渲染或者用 form.as_p -->
            {{ form.as_p }}
            <button type="submit">确认修改</button>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'profile' %}" style="color: #666; text-decoration: none;">返回个人中心</a>
        </div>
    </div>
</body>
</html>
