<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Let's Read!</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box; /* 防止padding撑大宽度 */
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background: #34495e; }
        .links { margin-top: 20px; font-size: 0.9em; }
        a { color: #2c3e50; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>登录</h2>
        <form method="post">
            {% csrf_token %}
            <!-- form.as_p 自动渲染用户名密码框 -->
            {{ form.as_p }}
            <button type="submit">登录</button>
        </form>
        <div class="links">
            没有账号？ <a href="{% url 'signup' %}">立即注册</a>
            <br><br>
            <a href="{% url 'index' %}">返回首页</a>
        </div>
    </div>
</body>
</html>
