<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} - {{ volume_name }} 插图</title>
    <style>
        /* 复用阅读页样式 */
        body { font-family: "Microsoft YaHei", sans-serif; background-color: #f5f5f5; margin: 0; padding-bottom: 80px; }
        .chapter-header { background-color: #f5f5f5; padding: 10px 20px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100;}
        .book-title { color: #333; text-decoration: none; font-weight: bold; font-size: 1.1em;}
        
        .gallery-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 10px;
            text-align: center;
        }
        
        .gallery-item {
            margin-bottom: 30px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .gallery-image {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }
        
        .image-caption {
            margin-top: 10px;
            color: #666;
            font-size: 0.9em;
        }

        .chapter-footer {
            position: fixed; bottom: 0; width: 100%; background: #f5f5f5; padding: 10px; text-align: center; border-top: 1px solid #ddd;
        }
        .footer-button {
            padding: 8px 25px; background: #2c3e50; color: white; border: none; border-radius: 20px; cursor: pointer; text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="chapter-header">
        <!-- 点击书名返回目录页 -->
        <a href="{% url 'book_detail' book.id %}" class="book-title">{{ book.title }}</a>
    </header>

    <div class="gallery-container">
        {% for ill in images %}
        <div class="gallery-item">
            <img src="{{ ill.image.url }}" alt="插图 {{ ill.index }}" class="gallery-image" loading="lazy">
            <!-- <div class="image-caption">图 {{ ill.index }}</div> -->
        </div>
        {% empty %}
            <p>暂无插图</p>
        {% endfor %}
    </div>

    <!-- 底部导航 -->
    <footer class="chapter-footer">
        <!-- 目录按钮 -->
        <button class="footer-button" onclick="location.href='{% url 'book_detail' book.id %}'">目录</button>
        
        {% if user.is_authenticated %}
            <button class="footer-button" onclick="location.href='{% url 'my_bookshelf' %}'">书架</button>
        {% endif %}
    </footer>
</body>
</html>
